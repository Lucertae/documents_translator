# ===========================================
# LAC Translate - Build & Release Workflow
# Builds Windows executable on version tags only
# ===========================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger ONLY on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.13'
  DISABLE_MODEL_SOURCE_CHECK: 'True'

jobs:
  # ===========================================
  # Windows Build
  # ===========================================
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-deps rapid-doc>=0.7.0
          pip install pyinstaller

      - name: Verify installations
        run: |
          python -c "import PySide6; print(f'PySide6: {PySide6.__version__}')"
          python -c "import transformers; print(f'transformers: {transformers.__version__}')"
          python -c "import torch; print(f'PyTorch: {torch.__version__}')"
          python -c "import pymupdf; print(f'PyMuPDF: {pymupdf.version}')"
          python -c "import rapidocr; print('RapidOCR: OK')"
          python -c "import rapid_doc; print('RapidDoc: OK')"

      - name: Build with PyInstaller
        run: |
          pyinstaller lac_translate.spec --clean --noconfirm

      - name: Create launcher script
        run: |
          echo '@echo off' > "dist/lac-translate/Avvia LAC Translate.bat"
          echo 'cd /d "%~dp0"' >> "dist/lac-translate/Avvia LAC Translate.bat"
          echo 'start "" lac-translate.exe' >> "dist/lac-translate/Avvia LAC Translate.bat"

      - name: Verify build
        run: |
          if (Test-Path "dist/lac-translate/lac-translate.exe") {
            Write-Host "✅ Build successful!"
            $size = (Get-ChildItem -Path "dist/lac-translate" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "📦 Total size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "❌ Build failed - executable not found"
            exit 1
          }

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
          # Verifica installazione
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /? | Select-Object -First 1

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if (Test-Path "dist/LAC-Translate-Setup-*.exe") {
            $installer = Get-ChildItem "dist/LAC-Translate-Setup-*.exe"
            Write-Host "✅ Installer creato: $($installer.Name) ($([math]::Round($installer.Length / 1MB, 2)) MB)"
          } else {
            Write-Host "❌ Errore: installer non trovato"
            exit 1
          }

      - name: Create ZIP archive (standalone)
        run: |
          Compress-Archive -Path "dist/lac-translate/*" -DestinationPath "lac-translate-windows.zip"

      - name: Upload Windows standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: lac-translate-windows
          path: lac-translate-windows.zip
          retention-days: 30

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lac-translate-installer
          path: dist/LAC-Translate-Setup-*.exe
          retention-days: 30

  # ===========================================
  # Create Release (only on tags)
  # ===========================================
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: lac-translate-windows

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: lac-translate-installer

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: LAC Translate ${{ steps.version.outputs.VERSION }}
          body: |
            ## LAC Translate ${{ steps.version.outputs.VERSION }}
            
            Traduttore professionale di PDF con OPUS-MT e RapidDoc OCR.
            
            ### Download
            - **Installer (consigliato)**: `LAC-Translate-Setup-*.exe` — doppio click, installa tutto, crea collegamenti
            - **Standalone (ZIP)**: `lac-translate-windows.zip` — estrai e avvia `lac-translate.exe`
            
            ### Requisiti
            - Windows 10/11
            - 8 GB+ RAM consigliati
            - Connessione internet al primo avvio (scarica il modello di traduzione, ~300 MB)
            
            ### Novità in ${{ steps.version.outputs.VERSION }}
            - Splash screen con barra di progresso durante l'avvio
            - Installer Windows (Inno Setup) — installazione/disinstallazione pulita
            - Fix caricamento DLL Qt6
            - Rilevamento colonne multi-layout (2/3/4+)
            - Supporto documenti bilingue affiancati
            - Estrazione strutturata RapidDoc (PP-DocLayoutV2 + RapidOCR)
          files: |
            lac-translate-windows.zip
            LAC-Translate-Setup-*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
